<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capture — RemotePlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      text-align: center;
    }
    .card h1 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }
    .hint {
      font-size: 0.85rem;
      margin: 1rem 0 1.5rem;
      line-height: 1.5;
    }
    #status {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    video,
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Condividi lo schermo del gioco</h1>
    <p class="hint dim">
      Scegli <strong>"Intero schermo"</strong> (non solo la finestra) quando il browser te lo chiede:
      è il solo modo per mandare anche l'audio del gioco al tuo amico.
    </p>
    <button id="share-btn" class="primary">Condividi schermo</button>
    <div id="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">in attesa</span>
    </div>
  </div>

  <video id="preview" muted playsinline></video>
  <canvas id="canvas"></canvas>

  <script src="/capture/capture.js"></script>
</body>
</html>
